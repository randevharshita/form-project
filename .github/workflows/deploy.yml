name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy to VM
        run: |
          cd /var/www/html/form-project

          git fetch origin
          git reset --hard origin/main

          source venv/bin/activate

          pip install -r requirements.txt

          sudo systemctl restart gunicorn